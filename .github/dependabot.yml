    directory: "/"
    schedule:
      interval: "weekly"
    rebase-strategy: "auto"
    groups:
      dev-dependencies:
        dependency-type: "development"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    rebase-strategy: "auto"
